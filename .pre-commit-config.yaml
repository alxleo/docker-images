repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-json
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.6.0
    hooks:
      - id: zizmor

  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        entry: shellcheck --severity=warning
        language: system
        types: [shell]
      - id: hadolint
        name: hadolint
        entry: hadolint --failure-threshold warning
        language: system
        files: 'Dockerfile'
        types: [dockerfile]
      - id: actionlint
        name: actionlint
        entry: actionlint
        language: system
        files: '\.github/workflows/'
        types: [yaml]
      - id: yamllint
        name: yamllint
        entry: yamllint
        language: system
        types: [yaml]
      - id: block-secret-files
        name: Block secret/env files
        entry: "Found a file that should never be committed to a public repo"
        language: fail
        files: '\.(env|secrets|key|pem|age)$|\.secrets\.|sops\.yaml'
      - id: caddy-fmt
        name: caddy fmt
        entry: bash -c 'for f in "$@"; do caddy fmt --diff "$f" || exit 1; done' --
        language: system
        files: 'Caddyfile'
