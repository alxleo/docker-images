repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: detect-private-key
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-json
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.23.1
    hooks:
      - id: zizmor

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^pr-reviewer/

  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        entry: shellcheck --severity=warning
        language: system
        types: [shell]
      - id: hadolint
        name: hadolint
        entry: hadolint --failure-threshold warning
        language: system
        files: 'Dockerfile'
        types: [dockerfile]
      - id: actionlint
        name: actionlint
        entry: actionlint
        language: system
        files: '\.github/workflows/'
        types: [yaml]
      - id: yamllint
        name: yamllint
        entry: yamllint
        language: system
        types: [yaml]
      - id: log-audit
        name: log audit (no sensitive data at INFO)
        entry: bash -c 'pattern="log\\.(info|warning)\\(.*[%,]\\s*(body|diff|raw_result|review_body|result\\.stdout|result\\.text)\\s*[,)]"; if grep -rPn "$pattern" "$@"; then echo "Sensitive data in INFO/WARNING log — use DEBUG"; exit 1; fi' --
        language: system
        files: ^pr-reviewer/scripts/.*\.py$
        types: [python]
      - id: no-unicode-in-config
        name: No unicode in config files
        entry: bash -c 'for f in "$@"; do if grep -Pn "[\x80-\xff]" "$f"; then echo "Non-ASCII in $f — use plain ASCII"; exit 1; fi; done' --
        language: system
        files: '\.(trivyignore|env|cfg|ini|conf)$|\.ci\.json$'
      - id: block-secret-files
        name: Block secret/env files
        entry: "Found a file that should never be committed to a public repo"
        language: fail
        files: '\.(env|secrets|key|pem|age)$|\.secrets\.|sops\.yaml'
      - id: caddy-fmt
        name: caddy fmt
        entry: bash -c 'for f in "$@"; do caddy fmt --diff "$f" || exit 1; done' --
        language: system
        files: 'Caddyfile'
