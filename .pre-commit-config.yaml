repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-json
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.0
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: block-secret-files
        name: Block secret/env files
        entry: "Found a file that should never be committed to a public repo"
        language: fail
        files: '\.(env|secrets|key|pem|age)$|\.secrets\.|sops\.yaml'
