# PR Reviewer configuration
#
# GitHub mode (gh_watcher.py): mount as /app/config.yml
# Gitea mode (gitea_webhook.py): mount as /app/config.yml

# GitHub-only: multi-org app credentials (env var names per org)
# apps:
#   myorg:
#     app_id_env: GH_APP_ID
#     installation_id_env: GH_APP_INSTALLATION_ID
#     private_key_env: gh_app_private_key    # read_secret checks /run/secrets/ first

# GitHub-only: repos to poll (owner/repo format)
repos:
  - alxleo/homelab
  - alxleo/docker-images

# GitHub-only: polling interval in seconds
polling_interval: 60

# GitHub-only: skip draft PRs (false = review on @pr-reviewer command even in drafts)
skip_drafts: true

# Gitea auto-review: lenses to run on PR open/sync
auto_lenses: [simplification, security]

# Default AI model family for review (claude, gemini, codex)
default_model: claude

# Explicit model versions per family — deterministic invocation
models:
  claude: sonnet              # auto/standard reviews
  claude_deep: opus           # deep reviews get the best model
  gemini: gemini-2.5-pro
  codex: o3

# Lens configuration
lenses:
  simplification:
    enabled: true
    max_comments: 5
  security:
    enabled: true
    max_comments: 5
  standards:
    enabled: true
    max_comments: 5
  drift:
    enabled: true
    max_comments: 5
  architecture:
    enabled: true
    max_comments: 5
  # Meta lens: post-hoc gap detection (runs opus by default — opt-in)
  meta:
    enabled: false
    max_comments: 3
    model: opus

# Deep review overrides (unlimited comments)
deep_overrides:
  max_comments: 0

# Quick review overrides
quick_overrides:
  lenses: [simplification]
  max_comments: 3

# Post-processing: verification + scoring (all optional — defaults apply if absent)
scoring_enabled: true           # LLM scoring pass via haiku (~$0.001/review)
scoring_threshold: 6            # drop findings scored below this (0-10)
max_total_comments: 7           # cross-lens total cap (0 = unlimited)
scoring_exempt_threshold: 9     # findings scored >= this bypass the total cap
dual_planner: true              # run both category + symbol planners, merge results
