version: 2

updates:
  # Keep GHA action versions current
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "ci"
      include: "scope"
    cooldown:
      default-days: 7

  # Base image updates — only images using Docker Hub directly.
  # Images using ghcr.io/alxleo/base-images/ mirrors are managed by
  # scripts/mirror-base-images.sh + .github/workflows/mirror-base-images.yml
  - package-ecosystem: docker
    directory: /semaphore
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "docker"
      include: "scope"
    cooldown:
      default-days: 7

  - package-ecosystem: docker
    directory: /restic-scheduler
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "docker"
      include: "scope"
    cooldown:
      default-days: 7
