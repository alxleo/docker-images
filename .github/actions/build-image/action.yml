# Reusable composite action: build Docker image.
#
# Handles the common build flow shared by all custom images:
#   1. Setup QEMU (conditional — only for cross-platform arm64 builds)
#   2. Setup buildx with mirrored BuildKit + docker.io mirror
#   3. Build single-platform image for local testing (docker load) with GHA cache
#
# Vulnerability scanning runs on a weekly schedule (maintenance.yml), not inline.
# Callers are responsible for: checkout, GHCR login, reading tags from manifests,
# image-specific tests, and pushing the final image.

name: Build & Scan Docker Image
description: Build a Docker image and scan it with Trivy

inputs:
  name:
    description: Image name (e.g. caddy-cloudflare)
    required: false
    default: ''
  context:
    description: Build context directory
    required: false
    default: ''
  tag:
    description: Upstream version tag (e.g. v2.9.1)
    required: false
    default: ''
  platforms:
    description: Target platforms (e.g. "linux/amd64,linux/arm64")
    required: false
    default: ''
  build-args:
    description: Newline-separated build args (e.g. "VERSION=1.0\nFOO=bar")
    required: false
    default: ''
  scope:
    description: GHA cache scope key (typically image name) to prevent cache collisions in matrix builds
    required: false
    default: ''

outputs:
  image-ref:
    description: Full image reference (registry/owner/name:tag) for downstream steps
    value: ghcr.io/alxleo/${{ inputs.name }}:${{ inputs.tag }}

runs:
  using: composite
  steps:
    # --- Setup QEMU for cross-platform builds ---
    # Only needed when target platforms include arm64 and the runner isn't arm64.
    # GitHub-hosted ubuntu-latest runners are amd64, so we check for arm64 in platforms.
    - name: Setup QEMU (cross-platform)
      if: ${{ contains(inputs.platforms, 'arm64') && runner.arch != 'ARM64' }}
      uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
      with:
        platforms: arm64

    # --- Setup buildx ---
    # BuildKit image mirrored to GHCR — avoids Docker Hub rate limits entirely.
    # docker.io mirror via mirror.gcr.io for base image pulls.
    - name: Setup buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      with:
        driver-opts: image=ghcr.io/alxleo/buildkit:v0.20.2
        buildkitd-config-inline: |
          [registry."docker.io"]
            mirrors = ["mirror.gcr.io"]

    # --- Build single-platform for local testing ---
    # load: true requires single platform. Uses runner's native arch for multi-platform images.
    # GHA cache scoped per image prevents matrix builds from evicting each other's cache.
    # cache-to only on non-PR builds — PR cache export adds 80-130s with no benefit
    # (PR branch caches rarely hit again). mode=min caches final layers only.
    - name: Build for local testing
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
      with:
        # zizmor: ignore[template-injection] — context is from our manifest, not user input
        context: ${{ inputs.context }}
        build-args: ${{ inputs.build-args }}
        platforms: ${{ contains(inputs.platforms, ',') && format('linux/{0}', runner.arch == 'ARM64' && 'arm64' || 'amd64') || inputs.platforms }}
        push: false
        load: true
        cache-from: type=gha,scope=${{ inputs.scope || inputs.name }}
        cache-to: ${{ github.event_name != 'pull_request' && format('type=gha,scope={0},mode=min', inputs.scope || inputs.name) || '' }}
        tags: |
          ghcr.io/alxleo/${{ inputs.name }}:${{ inputs.tag }}
          ghcr.io/alxleo/${{ inputs.name }}:latest
