# Build custom Docker images and push to ghcr.io
#
# Triggers:
#   - Pull requests: build-only (no push) + security scan — gates merge
#   - Push to main: build + scan + push to ghcr.io as :latest
#   - Tags (pr-reviewer/v*): build + scan + push as :vX.Y.Z + :latest
#   - Manual dispatch: build + scan + push (all images)
#
# Bot PRs (Dependabot, etc): Only lint + change detection run.
# Image builds are skipped — they're expensive and only matter on merge.
#
# Change detection: each image only builds when its own files change.
# This avoids pushing identical images that cause unnecessary pulls downstream.
#
# Security: Trivy scans every image BEFORE push.
#   - scanners: vuln — vulnerability scanning only (gitleaks handles secrets)
#   - severity: CRITICAL — only block on critical CVEs
#   - ignore-unfixed: true — skip base-image CVEs without patches
#     Known unfixable (as of 2026-02): CVE-2025-7458 (libsqlite3, Debian 12),
#     CVE-2023-45853 (zlib1g, Debian 12 will_not_fix).
#     Revisit when: Debian 13 (trixie) base images are available, or when
#     node:XX-slim moves to a newer Debian release.
#
# Custom images are driven by custom-images.json (matrix strategy).
# MCP images are driven by mcp-images.json (separate matrix).

name: Build Custom Images

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  push:
    branches: [main]
    tags: ['pr-reviewer/v*']
    paths:
      - 'caddy-cloudflare/**'
      - 'cadvisor/**'
      - 'git-mcp-server/**'
      - 'mcp-auth-proxy/**'
      - 'pr-reviewer/**'
      - 'semaphore/**'
      - 'dagu-ops/**'
      - 'mcp-substack/**'
      - 'mcp/**'
      - 'mcp-images.json'
      - 'custom-images.json'
      - 'test/**'
  pull_request:
    paths:
      - 'caddy-cloudflare/**'
      - 'cadvisor/**'
      - 'git-mcp-server/**'
      - 'mcp-auth-proxy/**'
      - 'pr-reviewer/**'
      - 'semaphore/**'
      - 'dagu-ops/**'
      - 'mcp-substack/**'
      - 'mcp/**'
      - 'mcp-images.json'
      - 'custom-images.json'
      - 'images.json'
      - 'test/**'
      - '.github/workflows/build-images.yml'
      - '.github/actions/build-image/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  OWNER: alxleo
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Detect which image directories actually changed.
  # workflow_dispatch skips detection and builds everything.
  changes:
    name: Detect changed images
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read  # dorny/paths-filter needs PR file list
    outputs:
      caddy-cloudflare: ${{ steps.filter.outputs.caddy-cloudflare }}
      cadvisor: ${{ steps.filter.outputs.cadvisor }}
      git-mcp-server: ${{ steps.filter.outputs.git-mcp-server }}
      mcp-auth-proxy: ${{ steps.filter.outputs.mcp-auth-proxy }}
      pr-reviewer: ${{ steps.filter.outputs.pr-reviewer }}
      semaphore: ${{ steps.filter.outputs.semaphore }}
      dagu-ops: ${{ steps.filter.outputs.dagu-ops }}
      mcp-substack: ${{ steps.filter.outputs.mcp-substack }}
      mcp: ${{ steps.filter.outputs.mcp }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            caddy-cloudflare:
              - 'caddy-cloudflare/**'
              - 'custom-images.json'
              - 'test/**'
            cadvisor:
              - 'cadvisor/**'
              - 'custom-images.json'
            git-mcp-server:
              - 'git-mcp-server/**'
              - 'custom-images.json'
            mcp-auth-proxy:
              - 'mcp-auth-proxy/**'
              - 'custom-images.json'
            pr-reviewer:
              - 'pr-reviewer/**'
            semaphore:
              - 'semaphore/**'
              - 'custom-images.json'
            dagu-ops:
              - 'dagu-ops/**'
              - 'custom-images.json'
            mcp-substack:
              - 'mcp-substack/**'
              - 'custom-images.json'
            mcp:
              - 'mcp/**'
              - 'mcp-images.json'
              - 'test/**'

  security-scan:
    name: Gitleaks secret scan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- Custom images (matrix) ---
  # Reads custom-images.json and builds each image that has changes.
  # Flow: checkout → build+scan (composite action) → test → push

  load-custom-matrix:
    name: Load custom image matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - id: set-matrix
        run: echo "matrix=$(jq -c '.' custom-images.json)" >> "$GITHUB_OUTPUT"

  custom-images:
    name: ${{ matrix.name }}
    needs: [changes, load-custom-matrix]
    if: always() && needs.load-custom-matrix.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.load-custom-matrix.outputs.matrix) }}
    steps:
      # --- Gate: skip if no changes (unless workflow_dispatch or tag trigger) ---
      # Change detection uses the context directory name as key (e.g., git-mcp-server
      # for the mcp-git image). pr-reviewer also triggers on pr-reviewer/v* tags.
      - name: Check if image should build
        id: should-build
        env:
          # Pass the changes output for this image's context directory.
          # needs.changes.outputs is empty on workflow_dispatch (changes job skipped).
          CHANGES_OUTPUT: ${{ needs.changes.outputs[matrix.context] }}
          EVENT_NAME: ${{ github.event_name }}
          IS_BOT_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.user.type == 'Bot' }}
          IMAGE_NAME: ${{ matrix.name }}
          GIT_REF: ${{ github.ref }}
        run: |
          # Skip bot PRs entirely
          if [ "$IS_BOT_PR" = "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping ${IMAGE_NAME} — bot PR"
            exit 0
          fi

          # workflow_dispatch or tag trigger → always build
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # pr-reviewer also builds on tag pushes
          if [ "$IMAGE_NAME" = "pr-reviewer" ] && [[ "$GIT_REF" == refs/tags/pr-reviewer/v* ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Normal case: check change detection output
          if [ "$CHANGES_OUTPUT" = "true" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping ${IMAGE_NAME} — no changes detected"
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        if: steps.should-build.outputs.skip != 'true'
        with:
          persist-credentials: false

      # --- Resolve image tag ---
      # Most images use the tag from custom-images.json.
      # pr-reviewer uses github.sha (tag field is "latest" in manifest).
      - name: Resolve tag and version
        if: steps.should-build.outputs.skip != 'true'
        id: meta
        env:
          MANIFEST_TAG: ${{ matrix.tag }}
          IMAGE_NAME: ${{ matrix.name }}
          GIT_REF: ${{ github.ref }}
          GIT_SHA: ${{ github.sha }}
        run: |
          # pr-reviewer uses git SHA as the image tag
          if [ "$IMAGE_NAME" = "pr-reviewer" ]; then
            TAG="$GIT_SHA"
          else
            TAG="$MANIFEST_TAG"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          # Extract release-please version from tag push (pr-reviewer/vX.Y.Z)
          VERSION=""
          if [[ "$GIT_REF" == refs/tags/"${IMAGE_NAME}"/v* ]]; then
            VERSION="${GIT_REF#refs/tags/"${IMAGE_NAME}"/}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # IMAGE_REF for test commands
          echo "IMAGE_REF=${REGISTRY}/${OWNER}/${IMAGE_NAME}:${TAG}" >> "$GITHUB_ENV"

      # --- Build + Trivy scan (composite action) ---
      # is_pr=true forces build-only mode (no push) so tests can run first.
      - name: Build and scan
        if: steps.should-build.outputs.skip != 'true'
        uses: ./.github/actions/build-image
        with:
          name: ${{ matrix.name }}
          context: ${{ matrix.context }}
          tag: ${{ steps.meta.outputs.tag }}
          version: ${{ steps.meta.outputs.version }}
          platforms: ${{ matrix.platforms }}
          trivyignore: ${{ matrix.trivyignore }}
          push_method: ${{ matrix.push_method }}
          is_pr: 'true'  # Always suppress push — we push after tests

      # --- Test setup (optional) ---
      # test_setup handles all prerequisites (uv, ripgrep, etc.)
      - name: Test setup
        if: steps.should-build.outputs.skip != 'true' && matrix.test_setup != ''
        env:
          IMAGE_REF: ${{ env.IMAGE_REF }}
        run: ${{ matrix.test_setup }}

      # --- Run test commands ---
      # test_commands is a JSON array. Each entry runs as a separate shell command
      # with $IMAGE_REF available. Empty arrays skip this step.
      - name: Run tests
        if: steps.should-build.outputs.skip != 'true' && toJson(matrix.test_commands) != '[]'
        env:
          IMAGE_REF: ${{ env.IMAGE_REF }}
          TEST_COMMANDS: ${{ toJson(matrix.test_commands) }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t cmds < <(echo "${TEST_COMMANDS}" | jq -r '.[]')
          for cmd in "${cmds[@]}"; do
            echo "::group::${cmd}"
            eval "$cmd"
            echo "::endgroup::"
          done

      # --- Push (skipped on PRs) ---
      # Re-invoke the composite action in push mode, OR push directly.
      # docker push_method: tag was already loaded, just push the tags.
      # buildx push_method: needs a fresh multi-platform build with --push.
      - name: Login to GHCR
        if: steps.should-build.outputs.skip != 'true' && github.event_name != 'pull_request'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push via docker
        if: >-
          steps.should-build.outputs.skip != 'true' &&
          github.event_name != 'pull_request' &&
          matrix.push_method == 'docker'
        env:
          IMAGE_NAME: ${{ matrix.name }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
          IMAGE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          docker push "${REGISTRY}/${OWNER}/${IMAGE_NAME}:${IMAGE_TAG}"
          docker push "${REGISTRY}/${OWNER}/${IMAGE_NAME}:latest"
          if [ -n "${IMAGE_VERSION}" ] && [ "${IMAGE_VERSION}" != "${IMAGE_TAG}" ]; then
            docker tag "${REGISTRY}/${OWNER}/${IMAGE_NAME}:${IMAGE_TAG}" \
              "${REGISTRY}/${OWNER}/${IMAGE_NAME}:${IMAGE_VERSION}"
            docker push "${REGISTRY}/${OWNER}/${IMAGE_NAME}:${IMAGE_VERSION}"
          fi

      - name: Push via buildx (multi-platform)
        if: >-
          steps.should-build.outputs.skip != 'true' &&
          github.event_name != 'pull_request' &&
          matrix.push_method == 'buildx'
        env:
          IMAGE_NAME: ${{ matrix.name }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
          IMAGE_VERSION: ${{ steps.meta.outputs.version }}
          IMAGE_PLATFORMS: ${{ matrix.platforms }}
          IMAGE_CONTEXT: ${{ matrix.context }}
        run: |
          TAGS="-t ${REGISTRY}/${OWNER}/${IMAGE_NAME}:${IMAGE_TAG}"
          TAGS="${TAGS} -t ${REGISTRY}/${OWNER}/${IMAGE_NAME}:latest"
          if [ -n "${IMAGE_VERSION}" ] && [ "${IMAGE_VERSION}" != "${IMAGE_TAG}" ]; then
            TAGS="${TAGS} -t ${REGISTRY}/${OWNER}/${IMAGE_NAME}:${IMAGE_VERSION}"
          fi
          # shellcheck disable=SC2086
          docker buildx build \
            --platform "${IMAGE_PLATFORMS}" \
            --push \
            ${TAGS} \
            "${IMAGE_CONTEXT}/"

  # --- MCP service images (matrix) ---

  load-mcp-matrix:
    name: Load MCP build matrix
    needs: changes
    if: >-
      always() &&
      (needs.changes.outputs.mcp == 'true' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'pull_request' || github.event.pull_request.user.type != 'Bot')
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - id: set-matrix
        run: echo "matrix=$(cat mcp-images.json | jq -c '.')" >> "$GITHUB_OUTPUT"

  mcp-images:
    name: MCP ${{ matrix.name }}
    needs: load-mcp-matrix
    if: >-
      always() &&
      needs.load-mcp-matrix.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read   # checkout
      packages: write  # push to GHCR
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.load-mcp-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: mcp
          file: mcp/${{ matrix.dockerfile }}
          build-args: ${{ matrix.build_args }}
          platforms: linux/amd64
          push: false
          load: true
          tags: |
            ghcr.io/alxleo/${{ matrix.name }}:${{ matrix.tag }}
            ghcr.io/alxleo/${{ matrix.name }}:latest
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ghcr.io/alxleo/${{ matrix.name }}:${{ matrix.tag }}
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true
          scanners: vuln
      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        env:
          IMAGE_NAME: ${{ matrix.name }}
          IMAGE_TAG: ${{ matrix.tag }}
        run: |
          docker push "ghcr.io/alxleo/${IMAGE_NAME}:${IMAGE_TAG}"
          docker push "ghcr.io/alxleo/${IMAGE_NAME}:latest"

  # Smoke test: validates entrypoint.py → mcp-proxy → MCP server chain
  # Runs 2 canary images (1 npm, 1 Python) through the full MCP handshake.
  # No API keys needed — initialize and tools/list work without auth.
  mcp-smoke-test:
    name: MCP smoke (${{ matrix.name }})
    needs: [changes, load-mcp-matrix, mcp-images]
    if: >-
      always() &&
      needs.mcp-images.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mcp-hackernews
            dockerfile: Dockerfile.npm
            build_args: "MCP_PACKAGE=mcp-hacker-news@1.0.3"
          - name: mcp-arxiv
            dockerfile: Dockerfile.python
            build_args: "MCP_PACKAGE=arxiv-mcp-server==0.3.2\nMCP_ENTRYPOINT=arxiv-mcp-server"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Build test image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: mcp
          file: mcp/${{ matrix.dockerfile }}
          build-args: ${{ matrix.build_args }}
          platforms: linux/amd64
          push: false
          load: true
          tags: test-${{ matrix.name }}:latest
      - name: Start container
        env:
          IMAGE_NAME: ${{ matrix.name }}
        run: |
          docker run -d --name "${IMAGE_NAME}" \
            -e MCP_STARTUP_JITTER=0 \
            -p 8080:8080 \
            "test-${IMAGE_NAME}:latest"
      - name: Run smoke tests
        env:
          IMAGE_NAME: ${{ matrix.name }}
        run: bash test/test-mcp-smoke.sh "${IMAGE_NAME}" 8080
      - name: Dump smoke logs on failure
        if: failure()
        env:
          IMAGE_NAME: ${{ matrix.name }}
        run: docker logs "${IMAGE_NAME}" 2>&1 | tail -100
      - name: Cleanup smoke container
        if: always()
        env:
          IMAGE_NAME: ${{ matrix.name }}
        run: docker rm -f "${IMAGE_NAME}" || true
      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
        with:
          enable-cache: false
        if: matrix.name == 'mcp-hackernews'
      - name: Tool filtering + secret tests
        if: matrix.name == 'mcp-hackernews'
        env:
          TEST_MCP_IMAGE: test-${{ matrix.name }}:latest
        run: uv run --with pytest --with requests -- python -m pytest test/test_tool_filtering.py -v --tb=short
      - name: Dump remaining container logs on failure
        if: failure()
        run: |
          for c in $(docker ps -aq --filter "name=test-"); do
            echo "=== $(docker inspect --format '{{.Name}}' "$c") ==="
            docker logs "$c" 2>&1 | tail -50
          done

  # E2E stack test: full Caddy → mcp-proxy → MCP server contract validation
  # Spins up Caddy + both canaries (npm: hackernews, Python: arxiv).
  # Tests: health endpoint contract (/ping), prefix stripping, MCP protocol
  # handshake, session headers, TLS with internal certs, service discovery.
  # This is the contract test that downstream repos (homelab) depend on.
  mcp-e2e-test:
    name: MCP E2E stack test
    needs: changes
    if: >-
      always() &&
      (needs.changes.outputs.caddy-cloudflare == 'true' || needs.changes.outputs.mcp == 'true'
       || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'pull_request' || github.event.pull_request.user.type != 'Bot')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
        with:
          enable-cache: false
      - name: Unit tests (no Docker)
        run: uv run --with pytest --with pyyaml --with requests -- python -m pytest test/test_manifests.py test/test_entrypoint.py -v
      - name: Validate MCP E2E Caddyfile
        run: |
          docker run --rm -v "${{ github.workspace }}/test:/test" \
            caddy:2.11 \
            caddy validate --config /test/Caddyfile.mcp-e2e --adapter caddyfile
      - name: Run E2E stack tests
        run: uv run --with pytest --with pyyaml --with requests -- python -m pytest test/test_mcp_stack.py -v --tb=short
      - name: Dump logs on failure
        if: failure()
        run: |
          cd test
          docker compose -f docker-compose.mcp-e2e.yml logs
      - name: Cleanup
        if: always()
        run: |
          cd test
          docker compose -f docker-compose.mcp-e2e.yml down -v
