# Build custom Docker images and push to ghcr.io
#
# Triggers:
#   - Pull requests: build-only (no push) + security scan — gates merge
#   - Push to main: build + scan + push to ghcr.io
#   - Manual dispatch: build + scan + push (all images)
#
# Bot PRs (Dependabot, etc): Only lint + change detection run.
# Image builds are skipped — they're expensive and only matter on merge.
#
# Change detection: each image only builds when its own files change.
# This avoids pushing identical images that cause unnecessary pulls downstream.
#
# Security: Trivy scans every image BEFORE push.
#   - scanners: vuln — vulnerability scanning only (gitleaks handles secrets)
#   - severity: CRITICAL — only block on critical CVEs
#   - ignore-unfixed: true — skip base-image CVEs without patches
#     Known unfixable (as of 2026-02): CVE-2025-7458 (libsqlite3, Debian 12),
#     CVE-2023-45853 (zlib1g, Debian 12 will_not_fix).
#     Revisit when: Debian 13 (trixie) base images are available, or when
#     node:XX-slim moves to a newer Debian release.
#
# Images:
#   - caddy-cloudflare: Caddy + Cloudflare DNS plugin for ACME DNS-01
#   - cadvisor: v0.56.2 built from source (Docker 29+ compat fix)
#   - git-mcp-server: Git repo management with native HTTP transport
#   - mcp-auth-proxy: OAuth proxy with VARCHAR(255) fix (sigbit/mcp-auth-proxy#111)
#   - pr-reviewer: AI PR reviewer with Claude/Gemini/Codex CLIs + GitHub CLI
#   - mcp-*: 15 MCP service images (npm + python based)

name: Build Custom Images

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  push:
    branches: [main]
    paths:
      - 'caddy-cloudflare/**'
      - 'cadvisor/**'
      - 'git-mcp-server/**'
      - 'mcp-auth-proxy/**'
      - 'pr-reviewer/**'
      - 'mcp/**'
      - 'mcp-images.json'
      - 'custom-images.json'
      - 'test/**'
  pull_request:
    paths:
      - 'caddy-cloudflare/**'
      - 'cadvisor/**'
      - 'git-mcp-server/**'
      - 'mcp-auth-proxy/**'
      - 'pr-reviewer/**'
      - 'mcp/**'
      - 'mcp-images.json'
      - 'custom-images.json'
      - 'images.json'
      - 'test/**'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  OWNER: alxleo
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Detect which image directories actually changed.
  # workflow_dispatch skips detection and builds everything.
  changes:
    name: Detect changed images
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read  # dorny/paths-filter needs PR file list
    outputs:
      caddy-cloudflare: ${{ steps.filter.outputs.caddy-cloudflare }}
      cadvisor: ${{ steps.filter.outputs.cadvisor }}
      git-mcp-server: ${{ steps.filter.outputs.git-mcp-server }}
      mcp-auth-proxy: ${{ steps.filter.outputs.mcp-auth-proxy }}
      pr-reviewer: ${{ steps.filter.outputs.pr-reviewer }}
      mcp: ${{ steps.filter.outputs.mcp }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            caddy-cloudflare:
              - 'caddy-cloudflare/**'
              - 'custom-images.json'
              - 'test/**'
            cadvisor:
              - 'cadvisor/**'
              - 'custom-images.json'
            git-mcp-server:
              - 'git-mcp-server/**'
              - 'custom-images.json'
            mcp-auth-proxy:
              - 'mcp-auth-proxy/**'
              - 'custom-images.json'
            pr-reviewer:
              - 'pr-reviewer/**'
            mcp:
              - 'mcp/**'
              - 'mcp-images.json'
              - 'test/**'

  security-scan:
    name: Gitleaks secret scan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  caddy-cloudflare:
    name: Caddy + Cloudflare DNS
    needs: changes
    if: >-
      always() &&
      (needs.changes.outputs.caddy-cloudflare == 'true' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'pull_request' || github.event.pull_request.user.type != 'Bot')
    runs-on: ubuntu-latest
    permissions:
      contents: read   # checkout
      packages: write  # push to GHCR
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Read image tag from manifest
        run: |
          TAG=$(jq -r '.[] | select(.name == "caddy-cloudflare") | .tag' custom-images.json)
          echo "IMAGE_TAG=${TAG}" >> "$GITHUB_ENV"
          echo "IMAGE_REF=${REGISTRY}/${OWNER}/caddy-cloudflare:${TAG}" >> "$GITHUB_ENV"
      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: caddy-cloudflare
          platforms: linux/amd64
          push: false
          load: true
          tags: |
            ${{ env.IMAGE_REF }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/caddy-cloudflare:latest
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ${{ env.IMAGE_REF }}
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true
          scanners: vuln
          trivyignores: caddy-cloudflare/.trivyignore
      - name: Validate test Caddyfile
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          docker run --rm -v "${WORKSPACE}/test:/test" \
            "${IMAGE_REF}" \
            caddy validate --config /test/Caddyfile.test --adapter caddyfile
      - name: Run Caddy routing E2E tests
        run: |
          cd test
          docker compose -f docker-compose.test.yml up -d --build --wait
          bash test-caddy-routing.sh
          docker compose -f docker-compose.test.yml down
      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
      - name: Functional tests
        env:
          TEST_CADDY_CLOUDFLARE_TAG: ${{ env.IMAGE_REF }}
        run: uv run --with pytest --with requests -- python -m pytest test/test_custom_images.py -m caddy_cloudflare -v
      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        run: |
          docker push "${IMAGE_REF}"
          docker push ${{ env.REGISTRY }}/${{ env.OWNER }}/caddy-cloudflare:latest

  cadvisor:
    name: cAdvisor (Docker 29+ build)
    needs: changes
    if: >-
      always() &&
      (needs.changes.outputs.cadvisor == 'true' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'pull_request' || github.event.pull_request.user.type != 'Bot')
    runs-on: ubuntu-latest
    permissions:
      contents: read   # checkout
      packages: write  # push to GHCR
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Read image tag from manifest
        run: |
          TAG=$(jq -r '.[] | select(.name == "cadvisor") | .tag' custom-images.json)
          echo "IMAGE_TAG=${TAG}" >> "$GITHUB_ENV"
          echo "IMAGE_REF=${REGISTRY}/${OWNER}/cadvisor:${TAG}" >> "$GITHUB_ENV"
      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: cadvisor
          platforms: linux/amd64
          push: false
          load: true
          tags: |
            ${{ env.IMAGE_REF }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/cadvisor:latest
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ${{ env.IMAGE_REF }}
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true
          scanners: vuln
          trivyignores: cadvisor/.trivyignore
      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
      - name: Functional tests
        env:
          TEST_CADVISOR_TAG: ${{ env.IMAGE_REF }}
        run: uv run --with pytest --with requests -- python -m pytest test/test_custom_images.py -m cadvisor -v
      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        run: |
          docker push "${IMAGE_REF}"
          docker push ${{ env.REGISTRY }}/${{ env.OWNER }}/cadvisor:latest

  git-mcp-server:
    name: Git MCP Server
    needs: changes
    if: >-
      always() &&
      (needs.changes.outputs.git-mcp-server == 'true' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'pull_request' || github.event.pull_request.user.type != 'Bot')
    runs-on: ubuntu-latest
    permissions:
      contents: read   # checkout
      packages: write  # push to GHCR
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Read image tag from manifest
        run: |
          TAG=$(jq -r '.[] | select(.name == "mcp-git") | .tag' custom-images.json)
          echo "IMAGE_TAG=${TAG}" >> "$GITHUB_ENV"
          echo "IMAGE_REF=${REGISTRY}/${OWNER}/mcp-git:${TAG}" >> "$GITHUB_ENV"
      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: git-mcp-server
          platforms: linux/amd64
          push: false
          load: true
          tags: |
            ${{ env.IMAGE_REF }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/mcp-git:latest
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ${{ env.IMAGE_REF }}
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true
          scanners: vuln
      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
      - name: Functional tests
        env:
          TEST_GIT_MCP_TAG: ${{ env.IMAGE_REF }}
        run: uv run --with pytest --with requests -- python -m pytest test/test_custom_images.py -m git_mcp_server -v
      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        run: |
          docker push "${IMAGE_REF}"
          docker push ${{ env.REGISTRY }}/${{ env.OWNER }}/mcp-git:latest

  mcp-auth-proxy:
    name: MCP Auth Proxy (VARCHAR fix)
    needs: changes
    if: >-
      always() &&
      (needs.changes.outputs.mcp-auth-proxy == 'true' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'pull_request' || github.event.pull_request.user.type != 'Bot')
    runs-on: ubuntu-latest
    permissions:
      contents: read   # checkout
      packages: write  # push to GHCR
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Read image tag from manifest
        run: |
          TAG=$(jq -r '.[] | select(.name == "mcp-auth-proxy") | .tag' custom-images.json)
          echo "IMAGE_TAG=${TAG}" >> "$GITHUB_ENV"
          echo "IMAGE_REF=${REGISTRY}/${OWNER}/mcp-auth-proxy:${TAG}" >> "$GITHUB_ENV"
      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: mcp-auth-proxy
          platforms: linux/amd64
          push: false
          load: true
          tags: |
            ${{ env.IMAGE_REF }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/mcp-auth-proxy:latest
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ${{ env.IMAGE_REF }}
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true
          scanners: vuln
          trivyignores: mcp-auth-proxy/.trivyignore
      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
      - name: Functional tests
        env:
          TEST_MCP_AUTH_PROXY_TAG: ${{ env.IMAGE_REF }}
        run: uv run --with pytest --with requests -- python -m pytest test/test_custom_images.py -m mcp_auth_proxy -v
      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        run: |
          docker push "${IMAGE_REF}"
          docker push ${{ env.REGISTRY }}/${{ env.OWNER }}/mcp-auth-proxy:latest

  pr-reviewer:
    name: PR Reviewer
    needs: changes
    if: >-
      always() &&
      (needs.changes.outputs.pr-reviewer == 'true' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'pull_request' || github.event.pull_request.user.type != 'Bot')
    runs-on: ubuntu-latest
    permissions:
      contents: read   # checkout
      packages: write  # push to GHCR
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: pr-reviewer
          platforms: linux/amd64
          push: false
          load: true
          tags: |
            ghcr.io/alxleo/pr-reviewer:${{ github.sha }}
            ghcr.io/alxleo/pr-reviewer:latest
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ghcr.io/alxleo/pr-reviewer:${{ github.sha }}
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true
          scanners: vuln
          trivyignores: pr-reviewer/.trivyignore
      - name: Smoke test — CLIs installed
        run: |
          docker run --rm ghcr.io/alxleo/pr-reviewer:${{ github.sha }} \
            sh -c "claude --version && gh --version && gemini --version && codex --version"
      - name: Smoke test — watcher imports
        run: |
          docker run --rm ghcr.io/alxleo/pr-reviewer:${{ github.sha }} \
            python3 -c "import yaml, json, subprocess, pathlib; print('imports OK')"
      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
      - name: Unit tests
        run: uv run --with pytest --with pyyaml --with httpx --with grep-ast -- python -m pytest pr-reviewer/tests/ -v
      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        run: |
          docker push ghcr.io/alxleo/pr-reviewer:${{ github.sha }}
          docker push ghcr.io/alxleo/pr-reviewer:latest

  load-mcp-matrix:
    name: Load MCP build matrix
    needs: changes
    if: >-
      always() &&
      (needs.changes.outputs.mcp == 'true' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'pull_request' || github.event.pull_request.user.type != 'Bot')
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - id: set-matrix
        run: echo "matrix=$(cat mcp-images.json | jq -c '.')" >> "$GITHUB_OUTPUT"

  mcp-images:
    name: MCP ${{ matrix.name }}
    needs: load-mcp-matrix
    if: >-
      always() &&
      needs.load-mcp-matrix.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read   # checkout
      packages: write  # push to GHCR
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.load-mcp-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: mcp
          file: mcp/${{ matrix.dockerfile }}
          build-args: ${{ matrix.build_args }}
          platforms: linux/amd64
          push: false
          load: true
          tags: |
            ghcr.io/alxleo/${{ matrix.name }}:${{ matrix.tag }}
            ghcr.io/alxleo/${{ matrix.name }}:latest
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ghcr.io/alxleo/${{ matrix.name }}:${{ matrix.tag }}
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true
          scanners: vuln
      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        env:
          IMAGE_NAME: ${{ matrix.name }}
          IMAGE_TAG: ${{ matrix.tag }}
        run: |
          docker push "ghcr.io/alxleo/${IMAGE_NAME}:${IMAGE_TAG}"
          docker push "ghcr.io/alxleo/${IMAGE_NAME}:latest"

  # Smoke test: validates entrypoint.py → mcp-proxy → MCP server chain
  # Runs 2 canary images (1 npm, 1 Python) through the full MCP handshake.
  # No API keys needed — initialize and tools/list work without auth.
  mcp-smoke-test:
    name: MCP smoke (${{ matrix.name }})
    needs: [changes, load-mcp-matrix, mcp-images]
    if: >-
      always() &&
      needs.mcp-images.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mcp-hackernews
            dockerfile: Dockerfile.npm
            build_args: "MCP_PACKAGE=mcp-hacker-news@1.0.3"
          - name: mcp-arxiv
            dockerfile: Dockerfile.python
            build_args: "MCP_PACKAGE=arxiv-mcp-server==0.3.2\nMCP_ENTRYPOINT=arxiv-mcp-server"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Build test image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: mcp
          file: mcp/${{ matrix.dockerfile }}
          build-args: ${{ matrix.build_args }}
          platforms: linux/amd64
          push: false
          load: true
          tags: test-${{ matrix.name }}:latest
      - name: Start container
        env:
          IMAGE_NAME: ${{ matrix.name }}
        run: |
          docker run -d --name "${IMAGE_NAME}" \
            -e MCP_STARTUP_JITTER=0 \
            -p 8080:8080 \
            "test-${IMAGE_NAME}:latest"
      - name: Run smoke tests
        env:
          IMAGE_NAME: ${{ matrix.name }}
        run: bash test/test-mcp-smoke.sh "${IMAGE_NAME}" 8080
      - name: Dump smoke logs on failure
        if: failure()
        env:
          IMAGE_NAME: ${{ matrix.name }}
        run: docker logs "${IMAGE_NAME}" 2>&1 | tail -100
      - name: Cleanup smoke container
        if: always()
        env:
          IMAGE_NAME: ${{ matrix.name }}
        run: docker rm -f "${IMAGE_NAME}" || true
      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
        if: matrix.name == 'mcp-hackernews'
      - name: Tool filtering + secret tests
        if: matrix.name == 'mcp-hackernews'
        env:
          TEST_MCP_IMAGE: test-${{ matrix.name }}:latest
        run: uv run --with pytest --with requests -- python -m pytest test/test_tool_filtering.py -v --tb=short
      - name: Dump remaining container logs on failure
        if: failure()
        run: |
          for c in $(docker ps -aq --filter "name=test-"); do
            echo "=== $(docker inspect --format '{{.Name}}' "$c") ==="
            docker logs "$c" 2>&1 | tail -50
          done

  # E2E stack test: full Caddy → mcp-proxy → MCP server contract validation
  # Spins up Caddy + both canaries (npm: hackernews, Python: arxiv).
  # Tests: health endpoint contract (/ping), prefix stripping, MCP protocol
  # handshake, session headers, TLS with internal certs, service discovery.
  # This is the contract test that downstream repos (homelab) depend on.
  mcp-e2e-test:
    name: MCP E2E stack test
    needs: changes
    if: >-
      always() &&
      (needs.changes.outputs.caddy-cloudflare == 'true' || needs.changes.outputs.mcp == 'true'
       || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'pull_request' || github.event.pull_request.user.type != 'Bot')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
      - name: Unit tests (no Docker)
        run: uv run --with pytest --with pyyaml --with requests -- python -m pytest test/test_manifests.py test/test_entrypoint.py -v
      - name: Validate MCP E2E Caddyfile
        run: |
          docker run --rm -v "${{ github.workspace }}/test:/test" \
            caddy:2.11 \
            caddy validate --config /test/Caddyfile.mcp-e2e --adapter caddyfile
      - name: Run E2E stack tests
        run: uv run --with pytest --with pyyaml --with requests -- python -m pytest test/test_mcp_stack.py -v --tb=short
      - name: Dump logs on failure
        if: failure()
        run: |
          cd test
          docker compose -f docker-compose.mcp-e2e.yml logs
      - name: Cleanup
        if: always()
        run: |
          cd test
          docker compose -f docker-compose.mcp-e2e.yml down -v
