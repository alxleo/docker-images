# Build custom Docker images and push to ghcr.io
#
# Triggers:
#   - Pull requests: build-only (no push) -- gates merge
#   - Push to main: build + push to ghcr.io as :latest
#   - Tags (*/v*): build + push as :vX.Y.Z + :latest
#   - Manual dispatch: build + push (all images)
#
# Bot PRs (Dependabot, etc): Only lint + change detection run.
# Image builds are skipped -- they're expensive and only matter on merge.
#
# Change detection: each image only builds when its own files change.
# This avoids pushing identical images that cause unnecessary pulls downstream.
#
# Security: Trivy vulnerability scanning runs on a weekly schedule
# (maintenance.yml), not inline. Gitleaks handles secret detection here.
#
# Auto-discovery: any directory with a Dockerfile + optional .ci.json is an image.
# discover-images.sh generates the matrix; individual image jobs are replaced by
# a single matrix job (custom-images). MCP images keep their own matrix pipeline.

name: Build Custom Images

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  push:
    branches: [main]
    tags: ['*/v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  OWNER: alxleo
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # Discovery + change detection
  # ---------------------------------------------------------------------------
  discover:
    name: Discover images
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      matrix: ${{ steps.matrix.outputs.result }}
      changed: ${{ steps.changes.outputs.changed }}
      ci_changed: ${{ steps.changes.outputs.ci_changed }}
      mcp_changed: ${{ steps.changes.outputs.mcp_changed }}
      e2e_changed: ${{ steps.changes.outputs.e2e_changed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Discover images
        id: matrix
        run: |
          result=$(bash scripts/discover-images.sh)
          echo "result=${result}" >> "$GITHUB_OUTPUT"

      - name: Detect changed directories
        id: changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            {
              echo "changed=[]"
              echo "mcp_changed=true"
              echo "e2e_changed=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Get changed files between base and head
          if [ -n "$BASE_SHA" ] && [ "$BASE_SHA" != "0000000000000000000000000000000000000000" ]; then
            changed_files=$(git diff --name-only "$BASE_SHA" HEAD 2>/dev/null || echo "")
          else
            # First push or missing base — build everything
            {
              echo "changed=[]"
              echo "mcp_changed=true"
              echo "e2e_changed=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Build JSON array of changed top-level directories
          changed_dirs=$(echo "$changed_files" | cut -d/ -f1 | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')

          # CI infra changed if build action, discover script, or build workflow changed
          ci_changed="false"
          if echo "$changed_files" | grep -qE '^(\.github/actions/|scripts/discover-images\.sh|\.github/workflows/build-images\.yml)'; then
            ci_changed="true"
          fi

          # MCP changed if mcp/ dir, mcp-images.json, or test/ changed
          mcp_changed="false"
          if echo "$changed_files" | grep -qE '^(mcp/|mcp-images\.json|test/)'; then
            mcp_changed="true"
          fi

          # E2E changed if mcp or caddy-cloudflare changed (E2E tests the full stack)
          e2e_changed="false"
          if echo "$changed_files" | grep -qE '^(mcp/|mcp-images\.json|caddy-cloudflare/|test/)'; then
            e2e_changed="true"
          fi

          {
            echo "changed=${changed_dirs}"
            echo "ci_changed=${ci_changed}"
            echo "mcp_changed=${mcp_changed}"
            echo "e2e_changed=${e2e_changed}"
          } >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Security scan (PRs only)
  # ---------------------------------------------------------------------------
  security-scan:
    name: Gitleaks secret scan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Run gitleaks
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo gitleaks/gitleaks --pattern 'gitleaks_*_linux_x64.tar.gz' --output - | tar xz -C /usr/local/bin gitleaks
          gitleaks detect --source . --verbose --redact

  # ---------------------------------------------------------------------------
  # Custom images — single matrix job replacing 7+ individual jobs
  #
  # Flow per image: discover -> should-build? -> build -> test -> push
  # The composite action handles build with GHA cache.
  # Push is handled inline after tests pass.
  # ---------------------------------------------------------------------------
  custom-images:
    name: ${{ matrix.name }}
    needs: [discover]
    if: >-
      needs.discover.result == 'success' &&
      (github.event_name != 'pull_request' || github.event.pull_request.user.type != 'Bot')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push git tags for build versions
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      # --- Skip unchanged images (workflow_dispatch builds all) ---
      - name: Check if image changed
        id: should-build
        env:
          EVENT_NAME: ${{ github.event_name }}
          CHANGED_DIRS: ${{ needs.discover.outputs.changed }}
          CI_CHANGED: ${{ needs.discover.outputs.ci_changed }}
          IMAGE_CONTEXT: ${{ matrix.context }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Build if image dir, test/, or CI infra changed; empty changed=[] means build all
          if [ "$CHANGED_DIRS" = "[]" ] || [ "$CI_CHANGED" = "true" ] || echo "$CHANGED_DIRS" | jq -e --arg dir "$IMAGE_CONTEXT" \
            '. as $d | ($dir | IN($d[])) or ("test" | IN($d[]))' > /dev/null 2>&1; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping ${{ matrix.name }} — no changes detected"
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        if: steps.should-build.outputs.build == 'true'
        with:
          fetch-depth: 0
          persist-credentials: true

      # --- Compute build version: {base}-build.{N} ---
      # Base version from .ci.json tag. Build counter from git tags.
      - name: Compute version
        if: steps.should-build.outputs.build == 'true' && github.event_name != 'pull_request'
        id: version
        env:
          IMAGE_NAME: ${{ matrix.name }}
          BASE_TAG: ${{ matrix.tag }}
        run: |
          PREFIX="${IMAGE_NAME}/${BASE_TAG}-build."
          LATEST=$(git tag -l "${PREFIX}*" --sort=-v:refname | head -1)
          if [ -n "$LATEST" ]; then
            N="${LATEST#"$PREFIX"}"
            NEXT=$((N + 1))
          else
            NEXT=1
          fi
          VERSION="${BASE_TAG}-build.${NEXT}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${IMAGE_NAME}/${VERSION}" >> "$GITHUB_OUTPUT"

      # --- Resolve tag (pr-reviewer uses github.sha, others use .ci.json tag) ---
      - name: Resolve image tag
        if: steps.should-build.outputs.build == 'true'
        id: tag
        env:
          CI_TAG: ${{ matrix.tag }}
          IMAGE_NAME: ${{ matrix.name }}
          GIT_SHA: ${{ github.sha }}
        run: |
          if [ "$IMAGE_NAME" = "pr-reviewer" ]; then
            echo "tag=${GIT_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${CI_TAG}" >> "$GITHUB_OUTPUT"
          fi

      # --- Build (no push — tests run first) ---
      - name: Build
        if: steps.should-build.outputs.build == 'true'
        id: build
        uses: ./.github/actions/build-image
        with:
          name: ${{ matrix.name }}
          context: ${{ matrix.context }}
          tag: ${{ steps.tag.outputs.tag }}
          build-args: ${{ matrix.build_args }}
          platforms: ${{ matrix.platforms }}
          scope: ${{ matrix.name }}

      # --- Test setup (install uv, ripgrep, etc.) ---
      - name: Test setup
        if: steps.should-build.outputs.build == 'true' && matrix.test_setup != ''
        env:
          TEST_SETUP: ${{ matrix.test_setup }}
        run: bash -c "$TEST_SETUP"

      # --- Run test commands ---
      - name: Run tests
        if: steps.should-build.outputs.build == 'true' && toJson(matrix.test_commands) != '[]'
        env:
          IMAGE_REF: ${{ steps.build.outputs.image-ref }}
          TEST_COMMANDS: ${{ toJson(matrix.test_commands) }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t cmds < <(echo "$TEST_COMMANDS" | jq -r '.[]')
          for cmd in "${cmds[@]}"; do
            echo "::group::${cmd}"
            bash -c "$cmd"
            echo "::endgroup::"
          done

      # --- GHCR login (non-PR only, before push) ---
      - name: Login to GHCR
        if: steps.should-build.outputs.build == 'true' && github.event_name != 'pull_request'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Push multi-platform via buildx ---
      - name: Push to GHCR
        if: >-
          steps.should-build.outputs.build == 'true' &&
          github.event_name != 'pull_request'
        env:
          IMAGE_NAME: ${{ matrix.name }}
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
          IMAGE_VERSION: ${{ steps.version.outputs.version }}
          IMAGE_PLATFORMS: ${{ matrix.platforms }}
          IMAGE_CONTEXT: ${{ matrix.context }}
          IMAGE_BUILD_ARGS: ${{ matrix.build_args }}
        run: |
          TAGS=(
            -t "ghcr.io/alxleo/${IMAGE_NAME}:${IMAGE_TAG}"
            -t "ghcr.io/alxleo/${IMAGE_NAME}:latest"
          )
          if [ -n "${IMAGE_VERSION}" ]; then
            TAGS+=(-t "ghcr.io/alxleo/${IMAGE_NAME}:${IMAGE_VERSION}")
          fi
          # Convert newline-separated build args to --build-arg flags
          BUILD_ARG_FLAGS=()
          if [ -n "${IMAGE_BUILD_ARGS}" ]; then
            while IFS= read -r arg; do
              [ -n "$arg" ] && BUILD_ARG_FLAGS+=(--build-arg "$arg")
            done <<< "${IMAGE_BUILD_ARGS}"
          fi
          docker buildx build \
            --platform "${IMAGE_PLATFORMS}" \
            --push \
            --cache-from type=gha,scope="${IMAGE_NAME}" \
            "${BUILD_ARG_FLAGS[@]}" \
            "${TAGS[@]}" \
            "${IMAGE_CONTEXT}/"

      # --- Create git tag for build version ---
      - name: Tag build version
        if: >-
          steps.should-build.outputs.build == 'true' &&
          github.event_name != 'pull_request' &&
          steps.version.outputs.tag_name
        env:
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
        run: |
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"

  # ---------------------------------------------------------------------------
  # MCP images — separate pipeline (own matrix, smoke tests, E2E)
  # ---------------------------------------------------------------------------
  load-mcp-matrix:
    name: Load MCP build matrix
    needs: discover
    if: >-
      always() &&
      (needs.discover.outputs.mcp_changed == 'true' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'pull_request' || github.event.pull_request.user.type != 'Bot')
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - id: set-matrix
        run: echo "matrix=$(cat mcp-images.json | jq -c '.')" >> "$GITHUB_OUTPUT"

  mcp-images:
    name: MCP ${{ matrix.name }}
    needs: load-mcp-matrix
    if: >-
      always() &&
      needs.load-mcp-matrix.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.load-mcp-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Setup QEMU (cross-platform)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
        with:
          platforms: arm64
      - name: Setup buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
        with:
          driver-opts: image=ghcr.io/alxleo/buildkit:v0.20.2
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]
      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # PRs: build amd64 only (verify Dockerfile compiles)
      # Push: multi-platform build + push
      - name: Build & push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: mcp
          file: mcp/${{ matrix.dockerfile }}
          build-args: ${{ matrix.build_args }}
          platforms: ${{ github.event_name != 'pull_request' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          cache-from: type=gha,scope=mcp-${{ matrix.name }}
          cache-to: ${{ github.event_name != 'pull_request' && format('type=gha,scope=mcp-{0},mode=min', matrix.name) || '' }}
          tags: |
            ghcr.io/alxleo/${{ matrix.name }}:${{ matrix.tag }}
            ghcr.io/alxleo/${{ matrix.name }}:latest

  # Smoke test: validates entrypoint.py -> mcp-proxy -> MCP server chain
  # Runs 2 canary images (1 npm, 1 Python) through the full MCP handshake.
  # No API keys needed — initialize and tools/list work without auth.
  mcp-smoke-test:
    name: MCP smoke (${{ matrix.name }})
    needs: [discover, load-mcp-matrix, mcp-images]
    if: >-
      always() &&
      needs.mcp-images.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mcp-hackernews
            dockerfile: Dockerfile.npm
            build_args: "MCP_PACKAGE=mcp-hacker-news@1.0.3"
          - name: mcp-arxiv
            dockerfile: Dockerfile.python
            build_args: "MCP_PACKAGE=arxiv-mcp-server==0.3.2\nMCP_ENTRYPOINT=arxiv-mcp-server"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Build test image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: mcp
          file: mcp/${{ matrix.dockerfile }}
          build-args: ${{ matrix.build_args }}
          platforms: linux/amd64
          push: false
          load: true
          tags: test-${{ matrix.name }}:latest
      - name: Start container
        env:
          IMAGE_NAME: ${{ matrix.name }}
        run: |
          docker run -d --name "${IMAGE_NAME}" \
            -e MCP_STARTUP_JITTER=0 \
            -p 8080:8080 \
            "test-${IMAGE_NAME}:latest"
      - name: Run smoke tests
        env:
          IMAGE_NAME: ${{ matrix.name }}
        run: bash test/test-mcp-smoke.sh "${IMAGE_NAME}" 8080
      - name: Dump smoke logs on failure
        if: failure()
        env:
          IMAGE_NAME: ${{ matrix.name }}
        run: docker logs "${IMAGE_NAME}" 2>&1 | tail -100
      - name: Cleanup smoke container
        if: always()
        env:
          IMAGE_NAME: ${{ matrix.name }}
        run: docker rm -f "${IMAGE_NAME}" || true
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: false
        if: matrix.name == 'mcp-hackernews'
      - name: Tool filtering + secret tests
        if: matrix.name == 'mcp-hackernews'
        env:
          TEST_MCP_IMAGE: test-${{ matrix.name }}:latest
        run: uv run --with pytest --with requests -- python -m pytest test/test_tool_filtering.py -v --tb=short
      - name: Dump remaining container logs on failure
        if: failure()
        run: |
          for c in $(docker ps -aq --filter "name=test-"); do
            echo "=== $(docker inspect --format '{{.Name}}' "$c") ==="
            docker logs "$c" 2>&1 | tail -50
          done

  # E2E stack test: full Caddy -> mcp-proxy -> MCP server contract validation
  # Spins up Caddy + both canaries (npm: hackernews, Python: arxiv).
  # Tests: health endpoint contract (/ping), prefix stripping, MCP protocol
  # handshake, session headers, TLS with internal certs, service discovery.
  # This is the contract test that downstream repos (homelab) depend on.
  mcp-e2e-test:
    name: MCP E2E stack test
    needs: discover
    if: >-
      always() &&
      (needs.discover.outputs.e2e_changed == 'true'
       || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'pull_request' || github.event.pull_request.user.type != 'Bot')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: false
      - name: Unit tests (no Docker)
        run: uv run --with pytest --with pyyaml --with requests -- python -m pytest test/test_manifests.py test/test_entrypoint.py -v
      - name: Validate MCP E2E Caddyfile
        run: |
          docker run --rm -v "${{ github.workspace }}/test:/test" \
            caddy:2.11 \
            caddy validate --config /test/Caddyfile.mcp-e2e --adapter caddyfile
      - name: Run E2E stack tests
        run: uv run --with pytest --with pyyaml --with requests -- python -m pytest test/test_mcp_stack.py -v --tb=short
      - name: Dump logs on failure
        if: failure()
        run: |
          cd test
          docker compose -f docker-compose.mcp-e2e.yml logs
      - name: Cleanup
        if: always()
        run: |
          cd test
          docker compose -f docker-compose.mcp-e2e.yml down -v
