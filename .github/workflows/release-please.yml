# Auto-versioning: conventional commits → version bumps + CHANGELOGs + GitHub Releases.
# Enables auto-merge on release PRs — they merge once branch protection is satisfied.

name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Auto-merge release PR
        if: steps.release.outputs.pr
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.release.outputs.pr }}
        run: gh pr merge "$PR_NUMBER" --repo "${{ github.repository }}" --squash --auto --delete-branch
