# Mirror Docker Hub base images to GHCR.
#
# Schedule: weekly refresh — picks up upstream security patches.
# PRs: check-only — fails if a Dockerfile references an image not yet mirrored.
# Manual: full mirror — for immediate updates after version bumps.

name: Mirror base images

on:
  schedule:
    - cron: '23 3 * * 1'  # Monday 3:23 AM UTC
  pull_request:
    paths:
      - '**/Dockerfile*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Check mirrors exist
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Verify all base image mirrors exist on GHCR
        run: bash scripts/mirror-base-images.sh --check

  mirror:
    name: Mirror base images
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Mirror base images
        run: bash scripts/mirror-base-images.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
