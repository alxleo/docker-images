name: Security Scan

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

jobs:
  trivy:
    name: Trivy (IaC + deps)
    if: >-
      github.event_name == 'push' ||
      (github.event.pull_request.draft == false &&
       github.actor != 'dependabot[bot]')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run Trivy (filesystem)
        uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518 # v0.34.1
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@45580472a5bb82c4681c4ac726cfdb60060c2ee1 # v3.32.4
        if: always() && (github.event_name == 'push' || !github.event.pull_request.head.repo.fork)
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  semgrep:
    name: Semgrep (SAST)
    if: >-
      github.event_name == 'push' ||
      (github.event.pull_request.draft == false &&
       github.actor != 'dependabot[bot]')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep:1.93.0
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run Semgrep
        run: semgrep scan --config auto --sarif --output semgrep-results.sarif

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@45580472a5bb82c4681c4ac726cfdb60060c2ee1 # v3.32.4
        if: always() && (github.event_name == 'push' || !github.event.pull_request.head.repo.fork)
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep
