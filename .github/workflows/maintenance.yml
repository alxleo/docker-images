# Weekly maintenance: vulnerability scanning and action updates.
#
# Trivy scans run here (not in CI) because they check deployed :latest images
# for new CVEs -- external changes, not code changes. Keeps builds fast and
# avoids blocking merges on upstream CVE churn.
name: Maintenance

on:
  schedule:
    - cron: '23 3 * * 1'  # Monday 03:23 UTC
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  OWNER: alxleo
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # Trivy vulnerability scan -- all pushed images
  # ---------------------------------------------------------------------------
  discover:
    name: Discover images
    runs-on: ubuntu-latest
    outputs:
      custom: ${{ steps.custom.outputs.images }}
      mcp: ${{ steps.mcp.outputs.images }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Custom images
        id: custom
        run: |
          images=$(bash scripts/discover-images.sh | jq -c '[.[] | {name, context}]')
          echo "images=${images}" >> "$GITHUB_OUTPUT"
      - name: MCP images
        id: mcp
        run: |
          images=$(jq -c '[.[] | {name}]' mcp-images.json)
          echo "images=${images}" >> "$GITHUB_OUTPUT"

  trivy-custom:
    name: Trivy ${{ matrix.name }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.custom) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ghcr.io/alxleo/${{ matrix.name }}:latest
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true
          scanners: vuln
          trivyignores: ${{ matrix.context }}/.trivyignore

  trivy-mcp:
    name: Trivy MCP ${{ matrix.name }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.mcp) }}
    steps:
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ghcr.io/alxleo/${{ matrix.name }}:latest
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true
          scanners: vuln

  # ---------------------------------------------------------------------------
  # Dockle CIS benchmark -- scans built images for runtime security issues
  # Catches setuid/setgid binaries, empty passwords, content trust violations
  # that static Dockerfile analysis can't detect.
  # ---------------------------------------------------------------------------
  dockle:
    name: Dockle ${{ matrix.name }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.custom) }}
    steps:
      - name: Run dockle
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            goodwithtech/dockle:latest \
            --exit-code 1 \
            --exit-level warn \
            --ignore CIS-DI-0001 \
            --ignore CIS-DI-0005 \
            --ignore DKL-DI-0006 \
            -af settings.py \
            "ghcr.io/alxleo/${{ matrix.name }}:latest"

  # ---------------------------------------------------------------------------
  # Update GitHub Actions to latest versions
  # ---------------------------------------------------------------------------
  update-actions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: true  # needed for git push

      - name: Update actions
        run: npx --yes actions-up --yes

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        if: steps.diff.outputs.changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="maintenance/update-actions-$(date +%Y%m%d)"
          git checkout -b "$branch"
          git add -A
          git commit -m "ci: update GitHub Actions versions"
          git push -u origin "$branch"
          gh pr create \
            --title "ci: update GitHub Actions versions" \
            --body "Automated weekly action version bump. Node 20 retirement: June 2026." \
            --draft
