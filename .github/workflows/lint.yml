# Lint Dockerfiles, shell scripts, YAML, GHA workflows, links, and GHA security
#
# Runs on all PRs and pushes to main — not path-filtered,
# so linting always gates merge regardless of what changed.

name: Lint

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  hadolint:
    name: Hadolint (Dockerfiles)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          recursive: true
          failure-threshold: warning

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          scandir: .
          severity: warning

  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - run: pip install yamllint
      - run: yamllint .

  actionlint:
    name: actionlint (GHA workflows)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: reviewdog/action-actionlint@a40b7d35e62844ec9c0096ff3f5ff48579c90759 # v1

  lychee:
    name: lychee (link checker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          args: --offline --no-progress '**/*.md'

  zizmor:
    name: zizmor (GHA security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - run: pipx install zizmor
      - run: zizmor .github/workflows/

  ruff:
    name: ruff (Python lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v8
      - run: uvx ruff check pr-reviewer/scripts pr-reviewer/tests

  pytest:
    name: pytest (pr-reviewer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6 # v5
        with:
          python-version: "3.11"
      - run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep
          pip install pytest respx httpx pyyaml pyjwt cryptography grep-ast tree-sitter-language-pack
      - run: pytest pr-reviewer/tests/ -x
        env:
          PYTHONPATH: pr-reviewer/scripts

  log-audit:
    name: log audit (no sensitive data at INFO)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Check for content leaked in INFO/WARNING logs
        run: |
          # Fail if any log.info/log.warning passes raw content variables as format args.
          # Safe: log.info("... %d chars", len(body))  — logs metadata
          # Unsafe: log.info("Preview: %s", body)       — logs content
          pattern='log\.(info|warning)\(.*[%,]\s*(body|diff|raw_result|review_body|result\.stdout|result\.text)\s*[,)]'
          if grep -rPn "$pattern" pr-reviewer/scripts/; then
            echo "::error::Sensitive data passed to INFO/WARNING log. Use DEBUG for content, INFO for metadata only."
            exit 1
          fi
