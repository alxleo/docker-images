# Lint via coding-standards (MegaLinter) + repo-specific checks
#
# coding-standards auto-detects and runs: hadolint, shellcheck, yamllint,
# actionlint, zizmor, ruff, lychee, gitleaks, semgrep, and more.
# Repo-specific jobs: pytest (pr-reviewer), log audit.

name: Lint

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  coding-standards:
    name: coding-standards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: alxleo/coding-standards/docker-action@be4a7028599c433241c1292fa6350b829a0ad709 # v1

  pytest:
    name: pytest (pr-reviewer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
      - run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep
          pip install pytest respx httpx pyyaml pyjwt cryptography grep-ast tree-sitter-language-pack
      - run: pytest pr-reviewer/tests/ -x
        env:
          PYTHONPATH: pr-reviewer/scripts

  log-audit:
    name: log audit (no sensitive data at INFO)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Check for content leaked in INFO/WARNING logs
        run: |
          # Fail if any log.info/log.warning passes raw content variables as format args.
          # Safe: log.info("... %d chars", len(body))  — logs metadata
          # Unsafe: log.info("Preview: %s", body)       — logs content
          pattern='log\.(info|warning)\(.*[%,]\s*(body|diff|raw_result|review_body|result\.stdout|result\.text)\s*[,)]'
          if grep -rPn "$pattern" pr-reviewer/scripts/; then
            echo "::error::Sensitive data passed to INFO/WARNING log. Use DEBUG for content, INFO for metadata only."
            exit 1
          fi
