# Hadolint baseline — synced to all repos.
# Per-repo overrides: add `ignore:` entries with documented reasoning.

trustedRegistries:
  - docker.io
  - ghcr.io

# Tightened rules for LLM-generated Dockerfiles.
# LLMs routinely omit version pins and --no-install-recommends.
failure-threshold: warning

strict-labels: true
