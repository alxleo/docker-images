# Ruff configuration for docker-images repo.
# Extends coding-standards baseline; overrides below are repo-specific.

line-length = 120

[lint]
# Rules enabled by coding-standards ruff.toml baseline.
# Suppress rules that conflict with this repo's design:
ignore = [
    # pr-reviewer/scripts/ uses PYTHONPATH, not packages -- __init__.py would break imports
    "INP001",
    # Scripts and MCP servers intentionally print to stdout
    "T201",
    # HTTP status codes (200, 404) are universally understood -- named constants hurt readability
    "PLR2004",
    # Intentional unicode in UI strings (arrows, multiplication sign)
    "RUF001",
    "RUF002",
    # Complexity warnings -- legitimate but not blocking; refactor separately
    "C901",
    "PLR0912",
    "PLR0915",
    "PLR0913",
    # Commented-out code in tests is often intentional (showing alternatives)
    "ERA001",
]

[lint.per-file-ignores]
# pr-reviewer runs CLI tools (claude, gh, gemini) as its core function -- not untrusted input
"pr-reviewer/scripts/*.py" = ["S603", "S607", "S606"]
# Test files use fake tokens, self-signed certs, and subprocess calls by design
"pr-reviewer/tests/*.py" = ["S105", "S501", "S603", "S607", "PLW1510"]
# mcp-substack server binds to 0.0.0.0 inside a container -- expected
"mcp-substack/server.py" = ["S104"]
# Entrypoint script uses subprocess to exec the server
"pr-reviewer/scripts/entrypoint.py" = ["S603", "S607"]
